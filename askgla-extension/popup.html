<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskGLA Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      background: #1a3a2a;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p  { font-size: 10.5px; opacity: 0.75; margin-top: 1px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .toggle-row label { font-weight: 600; font-size: 13px; }
    .toggle-row span  { font-size: 11px; color: #666; margin-top: 1px; display: block; }

    /* Toggle switch */
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 22px; cursor: pointer;
      transition: background .2s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s ease;
    }
    .switch input:checked + .slider { background: #1a3a2a; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-weight: 600; font-size: 12px; color: #333; }
    .field input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: #1a3a2a; }
    .field .hint { font-size: 10.5px; color: #888; }

    .btn-save {
      width: 100%;
      padding: 10px;
      background: #c9a227;
      color: #1a1a1a;
      font-weight: 700;
      font-size: 13px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save:hover { opacity: 0.88; }

    .status {
      text-align: center;
      font-size: 12px;
      color: #2e7d32;
      font-weight: 600;
      min-height: 18px;
    }

    .footer {
      border-top: 1px solid #eee;
      padding: 10px 16px;
      text-align: center;
      font-size: 10.5px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <div>
      <h1>AskGLA Widget</h1>
      <p>Extension Settings</p>
    </div>
  </div>

  <div class="body">
    <!-- Enable / Disable toggle -->
    <div class="toggle-row">
      <div>
        <label for="enabled">Widget enabled</label>
        <span>Reload the page after changing</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- API Base URL -->
    <div class="field">
      <label for="apiBase">Backend URL</label>
      <input type="url" id="apiBase" placeholder="http://localhost:8000">
      <span class="hint">The URL where your FastAPI backend is running</span>
    </div>

    <!-- Department slug -->
    <div class="field">
      <label for="dept">Department (optional)</label>
      <input type="text" id="dept" placeholder="admissions">
      <span class="hint">Leave blank to use the global config</span>
    </div>

    <button class="btn-save" id="save">Save Settings</button>
    <div class="status" id="status"></div>
  </div>

  <div class="footer">Changes apply on page reload</div>

  <script src="popup.js"></script>
</body>
</html>
